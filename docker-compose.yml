x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.11
  env_file: 
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "retailco_secret_key_2024"
    ERP_API_KEY: ${ERP_API_KEY}
    LAKE_DB_HOST: lake_postgres
    LAKE_DB_PORT: 5432
    LAKE_DB_NAME: lake
    LAKE_DB_USER: lake_user
    LAKE_DB_PASSWORD: lake_pass
    WAREHOUSE_DB_HOST: warehouse_postgres
    WAREHOUSE_DB_PORT: 5432
    WAREHOUSE_DB_NAME: warehouse
    WAREHOUSE_DB_USER: warehouse_user
    WAREHOUSE_DB_PASSWORD: warehouse_pass
    _PIP_ADDITIONAL_REQUIREMENTS: "requests psycopg2-binary python-dotenv dlt[sql_database] dbt-core dbt-postgres"
  volumes:
    - ./extractor/dags:/opt/airflow/dags
    - ./extractor:/opt/airflow/extractor
    - ./dlt_pipeline:/opt/airflow/dlt_pipeline
    - ./retailco_dbt:/opt/airflow/retailco_dbt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow_postgres:
      condition: service_healthy
    lake_postgres:
      condition: service_healthy
    warehouse_postgres:
      condition: service_healthy

services:

  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      retries: 5

  lake_postgres:
    image: postgres:15
    container_name: lake_postgres
    environment:
      POSTGRES_DB: lake
      POSTGRES_USER: lake_user
      POSTGRES_PASSWORD: lake_pass
    ports:
      - "5433:5432"
    volumes:
      - lake_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lake_user -d lake"]
      interval: 10s
      retries: 5

  warehouse_postgres:
    image: postgres:15
    container_name: warehouse_postgres
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
    ports:
      - "5435:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d warehouse"]
      interval: 10s
      retries: 5

  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    command: ["db", "init"]
    restart: "no"

  airflow_createuser:
    <<: *airflow-common
    container_name: airflow_createuser
    command: ["users", "create", "--username", "admin", "--password", "admin", "--firstname", "Admin", "--lastname", "User", "--role", "Admin", "--email", "admin@retailco.com"]
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    restart: "no"

  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: ["scheduler"]
    depends_on:
      airflow_createuser:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: ["webserver"]
    ports:
      - "8080:8080"
    depends_on:
      airflow_createuser:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  airflow_pg_data:
  lake_data:
  warehouse_data:
  airflow_logs: